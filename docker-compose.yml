version: "3"
services:
  postgres:
    image: zhparser/zhparser
    container_name: little-bear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: little_bear       # 直接指定数据库名称
      POSTGRES_USER: little_bear     # 直接指定数据库用户名
      POSTGRES_PASSWORD: little_bear_dev  # 直接指定数据库密码
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U little_bear -d little_bear"]  # 直接指定用户名和数据库名称
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:alpine
    container_name: little-bear-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio
    container_name: little-bear-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin      # 直接指定 MinIO 用户名
      MINIO_ROOT_PASSWORD: minioadmin  # 直接指定 MinIO 密码
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc
    container_name: little-bear-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin      # 直接指定 MinIO 用户名
      MINIO_ROOT_PASSWORD: minioadmin  # 直接指定 MinIO 密码
      MINIO_BUCKET: little-bear-rag    # 直接指定 Bucket 名称
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        mc anonymous set none "local/$$MINIO_BUCKET"
    restart: "no"

  qdrant:
    image: qdrant/qdrant
    container_name: little-bear-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"                   # 直接映射 HTTP 端口
      - "6334:6334"                   # 直接映射 gRPC 端口
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 仅用于演示的本地模型服务。
  # 如果您已有外部嵌入/重排序提供程序，请移除这两个
  # 服务，并将 active_config 中的 model_gateway.providers.*.base_url 指向
  # 您在设置初始化期间使用的实际提供程序 URL。
  tei-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: little-bear-tei-embedding
    restart: unless-stopped
    command:
      - --model-id
      - sentence-transformers/all-MiniLM-L12-v2
      - --served-model-name
      - all-MiniLM-L12-v2
    ports:
      - "8081:80"
    volumes:
      - tei-embedding-data:/data

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: little-bear-tei-rerank
    restart: unless-stopped
    command:
      - --model-id
      - BAAI/bge-reranker-base
      - --served-model-name
      - bge-reranker-base
    ports:
      - "8082:80"
    volumes:
      - tei-rerank-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
  qdrant-data:
  # 如果您已有外部嵌入/重排序提供程序，请移除这两个
  tei-embedding-data:
  tei-rerank-data: