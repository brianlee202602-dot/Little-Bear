openapi: 3.1.0
info:
  title: Little Bear RAG Backend API
  version: 0.1.0
  description: >
    P0 OpenAPI contract for Little Bear RAG backend. The contract covers setup,
    authentication, organization, permission, knowledge base, document import,
    indexing operations, query, audit, healthcheck, config, and internal model
    gateway APIs. P0 uses external embedding, rerank, and LLM provider
    endpoints instead of built-in model simulators, and does not include complete
    config approval or rollback workflows.

    Backend contract paths use /internal/v1. OpenAPI, backend routes, frontend
    SDKs, and contract tests should all use this path prefix consistently.
servers:
  - url: http://localhost:8000
    description: Local development
tags:
  - name: Setup
  - name: Auth
  - name: Query
  - name: KnowledgeBase
  - name: Import
  - name: AdminKnowledgeBase
  - name: AdminFolder
  - name: AdminDocument
  - name: AdminUser
  - name: AdminOrg
  - name: AdminPermission
  - name: AdminConfig
  - name: AdminAudit
  - name: Health
  - name: ModelGateway

security:
  - bearerAuth: []

paths:
  /internal/v1/setup-state:
    get:
      tags: [Setup]
      summary: Get setup state
      operationId: getSetupState
      security: []
      x-token-type: anonymous
      responses:
        "200":
          description: Setup state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStateResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/setup-config-validations:
    post:
      tags: [Setup]
      summary: Validate setup configuration
      operationId: createSetupConfigValidation
      security:
        - bearerAuth: []
      x-token-type: setup
      x-required-scope: setup:validate
      x-audit-required: true
      x-risk-level: high
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupConfigValidationRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupConfigValidationResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/setup-initialization:
    put:
      tags: [Setup]
      summary: Initialize system
      operationId: putSetupInitialization
      security:
        - bearerAuth: []
      x-token-type: setup
      x-required-scope: setup:initialize
      x-audit-required: true
      x-risk-level: critical
      x-confirmation-required: true
      x-confirmation-condition: always
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitializationRequest"
      responses:
        "200":
          description: Initialization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupInitializationResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/sessions:
    post:
      tags: [Auth]
      summary: Create session
      operationId: createSession
      security: []
      x-token-type: anonymous
      x-audit-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/sessions/current:
    delete:
      tags: [Auth]
      summary: Revoke current session
      operationId: deleteCurrentSession
      x-token-type: access
      x-required-scope: auth:session
      x-audit-required: true
      responses:
        "204":
          description: Session revoked
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/token-refreshes:
    post:
      tags: [Auth]
      summary: Rotate refresh token
      operationId: createTokenRefresh
      security:
        - bearerAuth: []
      x-token-type: refresh
      x-audit-required: true
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/users/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      x-token-type: access
      x-required-scope: auth:session
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/users/me/password:
    put:
      tags: [Auth]
      summary: Change current user password
      operationId: putCurrentUserPassword
      x-token-type: access
      x-required-scope: auth:password:update:self
      x-audit-required: true
      x-confirmation-required: true
      x-confirmation-condition: always
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
      responses:
        "204":
          description: Password changed
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/queries:
    post:
      tags: [Query]
      summary: Create non-streaming query
      operationId: createQuery
      x-token-type: access
      x-required-scope: rag:query
      x-audit-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/query-streams:
    post:
      tags: [Query]
      summary: Create streaming query
      operationId: createQueryStream
      x-token-type: access
      x-required-scope: rag:query
      x-audit-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: SSE query stream
          content:
            text/event-stream:
              schema:
                type: string
              x-sse-events:
                - metadata
                - token
                - citation
                - done
                - error
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/knowledge-bases:
    get:
      tags: [KnowledgeBase]
      summary: List accessible knowledge bases
      operationId: listKnowledgeBases
      x-token-type: access
      x-required-scope: knowledge_base:read
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Knowledge base list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/knowledge-bases/{kb_id}:
    get:
      tags: [KnowledgeBase]
      summary: Get accessible knowledge base
      operationId: getKnowledgeBase
      x-token-type: access
      x-required-scope: knowledge_base:read
      parameters:
        - $ref: "#/components/parameters/KbId"
      responses:
        "200":
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/knowledge-bases/{kb_id}/folders:
    get:
      tags: [KnowledgeBase]
      summary: List accessible folders
      operationId: listFolders
      x-token-type: access
      x-required-scope: knowledge_base:read
      parameters:
        - $ref: "#/components/parameters/KbId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Folder list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/knowledge-bases/{kb_id}/documents:
    get:
      tags: [KnowledgeBase]
      summary: List accessible documents
      operationId: listDocuments
      x-token-type: access
      x-required-scope: document:read
      parameters:
        - $ref: "#/components/parameters/KbId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [Import]
      summary: Upload files and create import job
      operationId: createUploadDocumentImport
      x-token-type: access
      x-required-scope: document:import
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/KbId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadRequest"
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/knowledge-bases/{kb_id}/document-imports:
    post:
      tags: [Import]
      summary: Create URL or metadata import job
      operationId: createDocumentImport
      x-token-type: access
      x-required-scope: document:import
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/KbId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentImportRequest"
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/documents/{doc_id}:
    get:
      tags: [KnowledgeBase]
      summary: Get accessible document
      operationId: getDocument
      x-token-type: access
      x-required-scope: document:read
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/documents/{doc_id}/versions:
    get:
      tags: [KnowledgeBase]
      summary: List accessible document versions
      operationId: listDocumentVersions
      x-token-type: access
      x-required-scope: document:read
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentVersionListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/documents/{doc_id}/chunks:
    get:
      tags: [KnowledgeBase]
      summary: List accessible document chunks
      operationId: listDocumentChunks
      x-token-type: access
      x-required-scope: document:read
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Chunk list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/documents/{doc_id}/preview:
    get:
      tags: [KnowledgeBase]
      summary: Preview accessible document
      operationId: getDocumentPreview
      x-token-type: access
      x-required-scope: document:read
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPreviewResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/import-jobs/{job_id}:
    get:
      tags: [Import]
      summary: Get import job
      operationId: getImportJob
      x-token-type: access
      x-required-scope: import_job:read:self
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Import job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [Import]
      summary: Update import job status
      operationId: patchImportJob
      x-token-type: access
      x-required-scope: import_job:manage:self
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportJobPatchRequest"
      responses:
        "200":
          description: Import job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/import-jobs/{job_id}/retries:
    post:
      tags: [Import]
      summary: Create import job retry
      operationId: createImportJobRetry
      x-token-type: access
      x-required-scope: import_job:manage:self
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "202":
          description: Retry job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/import-jobs:
    get:
      tags: [Import]
      summary: Admin list import jobs
      operationId: adminListImportJobs
      x-token-type: access
      x-required-scope: import_job:read
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Status"
        - name: stage
          in: query
          schema:
            type: string
        - name: kb_id
          in: query
          schema:
            type: string
        - name: created_by
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Import jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/import-jobs/{job_id}:
    get:
      tags: [Import]
      summary: Admin get import job
      operationId: adminGetImportJob
      x-token-type: access
      x-required-scope: import_job:read
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Import job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/knowledge-bases:
    get:
      tags: [AdminKnowledgeBase]
      summary: Admin list knowledge bases
      operationId: adminListKnowledgeBases
      x-token-type: access
      x-required-scope: knowledge_base:manage
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Knowledge bases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [AdminKnowledgeBase]
      summary: Admin create knowledge base
      operationId: adminCreateKnowledgeBase
      x-token-type: access
      x-required-scope: knowledge_base:manage
      x-audit-required: true
      x-confirmation-required: conditional
      x-confirmation-condition: default_visibility=enterprise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeBaseCreateRequest"
      responses:
        "201":
          description: Knowledge base created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/knowledge-bases/{kb_id}:
    get:
      tags: [AdminKnowledgeBase]
      summary: Admin get knowledge base
      operationId: adminGetKnowledgeBase
      x-token-type: access
      x-required-scope: knowledge_base:manage
      parameters:
        - $ref: "#/components/parameters/KbId"
      responses:
        "200":
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [AdminKnowledgeBase]
      summary: Admin update knowledge base
      operationId: adminPatchKnowledgeBase
      x-token-type: access
      x-required-scope: knowledge_base:manage
      x-audit-required: true
      x-confirmation-required: conditional
      x-confirmation-condition: visibility expands
      parameters:
        - $ref: "#/components/parameters/KbId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeBasePatchRequest"
      responses:
        "200":
          description: Knowledge base updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [AdminKnowledgeBase]
      summary: Admin delete knowledge base
      operationId: adminDeleteKnowledgeBase
      x-token-type: access
      x-required-scope: knowledge_base:manage
      x-audit-required: true
      x-risk-level: critical
      x-confirmation-required: true
      x-confirmation-condition: always
      parameters:
        - $ref: "#/components/parameters/KbId"
      responses:
        "202":
          description: Knowledge base delete accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/knowledge-bases/{kb_id}/folders:
    get:
      tags: [AdminFolder]
      summary: Admin list folders
      operationId: adminListFolders
      x-token-type: access
      x-required-scope: folder:manage
      parameters:
        - $ref: "#/components/parameters/KbId"
      responses:
        "200":
          description: Folders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderListResponse"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [AdminFolder]
      summary: Admin create folder
      operationId: adminCreateFolder
      x-token-type: access
      x-required-scope: folder:manage
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/KbId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderCreateRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/folders/{folder_id}:
    get:
      tags: [AdminFolder]
      summary: Admin get folder
      operationId: adminGetFolder
      x-token-type: access
      x-required-scope: folder:manage
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "200":
          description: Folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [AdminFolder]
      summary: Admin update folder
      operationId: adminPatchFolder
      x-token-type: access
      x-required-scope: folder:manage
      x-audit-required: true
      parameters:
        - $ref: "#/components/parameters/FolderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderPatchRequest"
      responses:
        "200":
          description: Folder updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [AdminFolder]
      summary: Admin delete folder
      operationId: adminDeleteFolder
      x-token-type: access
      x-required-scope: folder:manage
      x-audit-required: true
      x-confirmation-required: true
      x-confirmation-condition: always
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "202":
          description: Folder delete accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/knowledge-bases/{kb_id}/documents:
    get:
      tags: [AdminDocument]
      summary: Admin list documents
      operationId: adminListDocuments
      x-token-type: access
      x-required-scope: document:manage
      parameters:
        - $ref: "#/components/parameters/KbId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/documents/{doc_id}:
    get:
      tags: [AdminDocument]
      summary: Admin get document
      operationId: adminGetDocument
      x-token-type: access
      x-required-scope: document:manage
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        default:
          $ref: "#/components/responses/Error"
    patch:
      tags: [AdminDocument]
      summary: Admin update document
      operationId: adminPatchDocument
      x-token-type: access
      x-required-scope: document:manage
      x-audit-required: true
      x-confirmation-required: conditional
      x-confirmation-condition: visibility expands
      parameters:
        - $ref: "#/components/parameters/DocId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentPatchRequest"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [AdminDocument]
      summary: Admin delete document
      operationId: adminDeleteDocument
      x-token-type: access
      x-required-scope: document:manage
      x-audit-required: true
      x-risk-level: critical
      x-confirmation-required: true
      x-confirmation-condition: always
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "202":
          description: Document delete accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/documents/{doc_id}/index-jobs:
    post:
      tags: [AdminDocument]
      summary: Create document index rebuild job
      operationId: adminCreateDocumentIndexJob
      x-token-type: access
      x-required-scope: document:index
      x-audit-required: true
      x-confirmation-required: true
      x-confirmation-condition: always
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "202":
          description: Index job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/admin/documents/{doc_id}/versions:
    get:
      tags: [AdminDocument]
      summary: Admin list document versions
      operationId: adminListDocumentVersions
      x-token-type: access
      x-required-scope: document:manage
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Versions
          content:
