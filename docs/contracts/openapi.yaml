      x-token-type: service
      x-required-scope: model_gateway:invoke
      x-audit-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerankRequest"
      responses:
        "200":
          description: Rerank result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerankResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/model-chat-completions:
    post:
      tags: [ModelGateway]
      summary: Internal create chat completion
      operationId: createModelChatCompletion
      x-token-type: service
      x-required-scope: model_gateway:invoke
      x-audit-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/model-catalog:
    get:
      tags: [ModelGateway]
      summary: Internal list model catalog
      operationId: getModelCatalog
      x-token-type: service
      x-required-scope: model_gateway:read
      responses:
        "200":
          description: Model catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelCatalogResponse"
        default:
          $ref: "#/components/responses/Error"

  /internal/v1/model-health:
    get:
      tags: [ModelGateway]
      summary: Internal model gateway health
      operationId: getModelHealth
      x-token-type: service
      x-required-scope: model_gateway:read
      responses:
        "200":
          description: Model gateway health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
    KbId:
      name: kb_id
      in: path
      required: true
      schema:
        type: string
    DocId:
      name: doc_id
      in: path
      required: true
      schema:
        type: string
    FolderId:
      name: folder_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
    DepartmentId:
      name: department_id
      in: path
      required: true
      schema:
        type: string
    RoleId:
      name: role_id
      in: path
      required: true
      schema:
        type: string
    BindingId:
      name: binding_id
      in: path
      required: true
      schema:
        type: string
    ConfigKey:
      name: key
      in: path
      required: true
      schema:
        type: string
    ConfigVersion:
      name: version
      in: path
      required: true
      schema:
        type: integer
    AuditId:
      name: audit_id
      in: path
      required: true
      schema:
        type: string
    QueryLogId:
      name: query_log_id
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    RequestId:
      type: string
      examples: ["req_001"]
    Timestamp:
      type: string
      format: date-time
    AnyObject:
      type: object
      additionalProperties: true
    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    ErrorResponse:
      type: object
      required: [request_id, error_code, message, retryable]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        error_code:
          type: string
        message:
          type: string
        stage:
          type: string
        retryable:
          type: boolean
        details:
          $ref: "#/components/schemas/AnyObject"
    AcceptedResponse:
      type: object
      required: [request_id, data]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: object
          required: [accepted]
          properties:
            accepted:
              type: boolean
            job_id:
              type: [string, "null"]

    Visibility:
      type: string
      enum: [department, enterprise]
    ResourceType:
      type: string
      enum: [enterprise, department, user, role, role_binding, permission, knowledge_base, folder, document, chunk, import_job, config, query, setup, model_call]
    RiskLevel:
      type: string
      enum: [low, medium, high, critical]
    SetupStatus:
      type: string
      enum:
        - not_initialized
        - setup_required
        - validating_config
        - testing_dependencies
        - creating_admin
        - publishing_config
        - initialized
        - validation_failed
        - dependency_test_failed
        - initialization_failed
        - recovery_required
        - recovery_validating_config
        - recovery_publishing_config
    LifecycleStatus:
      type: string
      enum: [draft, active, disabled, locked, archived, deleted]
    ImportJobStatus:
      type: string
      enum: [queued, running, retrying, partial_success, success, failed, cancelled]

    SetupConfigValidationRequest:
      type: object
      required: [setup, config]
      properties:
        setup:
          $ref: "#/components/schemas/SetupPayload"
        config:
          $ref: "#/components/schemas/ActiveConfigV1"
    SetupInitializationRequest:
      $ref: "#/components/schemas/SetupConfigValidationRequest"
    SetupPayload:
      type: object
      required: [admin, organization, roles]
      properties:
        admin:
          $ref: "#/components/schemas/SetupAdmin"
        organization:
          $ref: "#/components/schemas/SetupOrganization"
        roles:
          $ref: "#/components/schemas/SetupRoles"
        model_provider_secrets:
          $ref: "#/components/schemas/ModelProviderSecrets"
    SetupAdmin:
      type: object
      required: [username, display_name, initial_password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        initial_password:
          type: string
          format: password
          minLength: 12
          writeOnly: true
        email:
          type: [string, "null"]
          format: email
        phone:
          type: [string, "null"]
    SetupOrganization:
      type: object
      required: [enterprise, departments]
      properties:
        enterprise:
          type: object
          required: [name, code]
          properties:
            name:
              type: string
            code:
              type: string
        departments:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, code, is_default]
            properties:
              name:
                type: string
              code:
                type: string
              is_default:
                type: boolean
    SetupRoles:
      type: object
      required: [builtin_roles, admin_role, default_user_role]
      properties:
        builtin_roles:
          type: array
          items:
            type: string
            enum:
              - system_admin
              - security_admin
              - audit_admin
              - department_admin
              - knowledge_base_admin
              - employee
        admin_role:
          type: string
          const: system_admin
        default_user_role:
          type: string
          const: employee
    ModelProviderSecrets:
      type: object
      properties:
        embedding_auth_token:
          type: [string, "null"]
          format: password
          writeOnly: true
        rerank_auth_token:
          type: [string, "null"]
          format: password
          writeOnly: true
        llm_auth_token:
          type: [string, "null"]
          format: password
          writeOnly: true
    ActiveConfigV1:
      type: object
      required:
        - schema_version
        - config_version
        - scope
        - secret_provider
        - redis
        - storage
        - vector_store
        - keyword_search
        - model_gateway
        - model
        - llm
        - auth
        - retrieval
        - chunk
        - import
        - permission
        - security
        - cache
        - rate_limit
        - timeout
        - degrade
        - audit
        - observability
      properties:
        schema_version:
          type: integer
          const: 1
        config_version:
          type: integer
          minimum: 1
        scope:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              const: global
            id:
              type: string
              const: global
        secret_provider:
          $ref: "#/components/schemas/SecretProviderConfig"
        redis:
          $ref: "#/components/schemas/AnyObject"
        storage:
          $ref: "#/components/schemas/AnyObject"
        vector_store:
          $ref: "#/components/schemas/AnyObject"
        keyword_search:
          $ref: "#/components/schemas/AnyObject"
        model_gateway:
          $ref: "#/components/schemas/ModelGatewayConfig"
        model:
          $ref: "#/components/schemas/ModelConfig"
        llm:
          $ref: "#/components/schemas/AnyObject"
        auth:
          $ref: "#/components/schemas/AnyObject"
        retrieval:
          $ref: "#/components/schemas/AnyObject"
        chunk:
          $ref: "#/components/schemas/AnyObject"
        import:
          $ref: "#/components/schemas/AnyObject"
        permission:
          $ref: "#/components/schemas/AnyObject"
        security:
          $ref: "#/components/schemas/AnyObject"
        cache:
          $ref: "#/components/schemas/AnyObject"
        rate_limit:
          $ref: "#/components/schemas/AnyObject"
        timeout:
          $ref: "#/components/schemas/AnyObject"
        degrade:
          $ref: "#/components/schemas/AnyObject"
        audit:
          $ref: "#/components/schemas/AnyObject"
        observability:
          $ref: "#/components/schemas/AnyObject"
    SecretProviderConfig:
      type: object
      required: [type, endpoint, auth_method, secret_ref_policy]
      properties:
        type:
          type: string
          enum: [postgres_encrypted, vault, kms]
        endpoint:
          type: string
        auth_method:
          type: string
        secret_ref_policy:
          type: object
          additionalProperties: true
    ModelGatewayConfig:
      type: object
      required: [mode, auth_token_ref, providers, routes, healthcheck]
      properties:
        mode:
          type: string
          enum: [external]
        auth_token_ref:
          type: [string, "null"]
        providers:
          type: object
          required: [embedding, rerank, llm]
          properties:
            embedding:
              $ref: "#/components/schemas/ModelProviderConfig"
            rerank:
              $ref: "#/components/schemas/ModelProviderConfig"
            llm:
              $ref: "#/components/schemas/ModelProviderConfig"
        routes:
          type: object
          additionalProperties: true
        healthcheck:
          type: object
          additionalProperties: true
    ModelProviderConfig:
      type: object
      required: [type, base_url, healthcheck_path, auth_token_ref]
      properties:
        type:
          type: string
          enum: [tei, openai_compatible, http]
        base_url:
          type: string
        auth_token_ref:
          type: [string, "null"]
        healthcheck_path:
          type: string
        embeddings_path:
          type: string
        rerank_path:
          type: string
        chat_completions_path:
          type: string
    ModelConfig:
      type: object
      required:
        - embedding_model
        - embedding_version
        - embedding_dimension
        - embedding_normalize
        - rerank_model
        - llm_model
      properties:
        embedding_model:
          type: string
        embedding_version:
          type: string
        embedding_dimension:
          type: integer
        embedding_normalize:
          type: boolean
        embedding_tokenizer_version:
          type: string
        rerank_model:
          type: string
        llm_model:
          type: string
        llm_fallback_model:
          type: string

    SetupStateResponse:
      type: object
      required: [request_id, data]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: object
          required: [initialized, setup_status]
          properties:
            initialized:
              type: boolean
            setup_status:
              $ref: "#/components/schemas/SetupStatus"
            system_token_expires_at:
              type: [string, "null"]
              format: date-time
    SetupConfigValidationResponse:
      type: object
      required: [request_id, data]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: object
          required: [valid, errors, warnings]
          properties:
            valid:
              type: boolean
            errors:
              type: array
              items:
                $ref: "#/components/schemas/ValidationIssue"
            warnings:
              type: array
              items:
                $ref: "#/components/schemas/ValidationIssue"
    ValidationIssue:
      type: object
      required: [error_code, path, message, retryable]
      properties:
        error_code:
          type: string
        path:
          type: string
        message:
          type: string
        retryable:
          type: boolean
    SetupInitializationResponse:
      type: object
      required: [request_id, data]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: object
          required: [initialized, active_config_version]
          properties:
            initialized:
              type: boolean
            active_config_version:
              type: integer

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          writeOnly: true
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
    PasswordChangeRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    QueryRequest:
      type: object
      required: [kb_ids, query]
      properties:
        kb_ids:
          type: array
          items:
            type: string
        query:
          type: string
          minLength: 1
        mode:
          type: string
          enum: [answer, search]
          default: answer
        filters:
          type: object
          additionalProperties: true
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 8
        include_sources:
          type: boolean
          default: true
    QueryResponse:
      type: object
      required: [request_id, answer, citations, degraded, trace_id]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        confidence:
          type: string
          enum: [low, medium, high]
        degraded:
          type: boolean
        degrade_reason:
          type: [string, "null"]
        trace_id:
          type: string
    Citation:
      type: object
      required: [source_id, doc_id, document_version_id, title, page_start, page_end]
      properties:
        source_id:
          type: string
        doc_id:
          type: string
        document_version_id:
          type: string
        title:
          type: string
        page_start:
          type: integer
        page_end:
          type: integer
        score:
          type: number

    KnowledgeBase:
      type: object
      required: [id, name, status, owner_department_id, default_visibility]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, disabled, archived]
        owner_department_id:
          type: string
        default_visibility:
          $ref: "#/components/schemas/Visibility"
        config_scope_id:
          type: [string, "null"]
    KnowledgeBaseCreateRequest:
      type: object
      required: [name, owner_department_id, default_visibility]
      properties:
        name:
          type: string
        owner_department_id:
          type: string
        default_visibility:
          $ref: "#/components/schemas/Visibility"
        config_scope_id:
          type: [string, "null"]
    KnowledgeBasePatchRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, disabled, archived]
        default_visibility:
          $ref: "#/components/schemas/Visibility"
    KnowledgeBaseResponse:
      type: object
      required: [request_id, data]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          $ref: "#/components/schemas/KnowledgeBase"
    KnowledgeBaseListResponse:
      type: object
      required: [request_id, data, pagination]
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeBase"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Folder:
      type: object
      required: [id, kb_id, name, status]
      properties:
        id:
          type: string
        kb_id:
          type: string
        parent_id:
          type: [string, "null"]
        name:
          type: string
        status:
          type: string
          enum: [active, disabled, archived]
    FolderCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parent_id:
          type: [string, "null"]
    FolderPatchRequest:
      type: object
      properties:
        name:
          type: string
        parent_id:
          type: [string, "null"]
        status:
          type: string
          enum: [active, disabled, archived]
    FolderResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          $ref: "#/components/schemas/Folder"
    FolderListResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Folder"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Document:
      type: object
      required: [id, kb_id, title, lifecycle_status, index_status, owner_department_id, visibility]
      properties:
        id:
          type: string
        kb_id:
          type: string
        folder_id:
          type: [string, "null"]
        title:
          type: string
        lifecycle_status:
          type: string
          enum: [draft, active, archived, deleted]
        index_status:
          type: string
          enum: [none, indexing, indexed, index_failed, blocked]
        owner_department_id:
          type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
        current_version_id:
          type: [string, "null"]
    DocumentPatchRequest:
      type: object
      properties:
        title:
          type: string
        folder_id:
          type: [string, "null"]
        tags:
          type: array
          items:
            type: string
        owner_department_id:
          type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
        lifecycle_status:
          type: string
          enum: [active, archived, deleted]
    DocumentResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          $ref: "#/components/schemas/Document"
    DocumentListResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        pagination:
          $ref: "#/components/schemas/Pagination"
    DocumentVersion:
      type: object
      properties:
        id:
          type: string
        document_id:
          type: string
        version_no:
          type: integer
        status:
          type: string
    DocumentVersionListResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/DocumentVersion"
    Chunk:
      type: object
      properties:
        id:
          type: string
        document_id:
          type: string
        document_version_id:
          type: string
        text_preview:
          type: string
        page_start:
          type: integer
        page_end:
          type: integer
        status:
          type: string
    ChunkListResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
    DocumentPreviewResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: object
          properties:
            doc_id:
              type: string
            title:
              type: string
            preview:
              type: string
            citations:
              type: array
              items:
                $ref: "#/components/schemas/Citation"
    IndexVersion:
      type: object
      properties:
        id:
          type: string
        document_id:
          type: string
        status:
          type: string
          enum: [draft, ready, active, archived, pending_delete, failed]
        chunk_count:
          type: integer
    IndexVersionListResponse:
      type: object
      properties:
        request_id:
          $ref: "#/components/schemas/RequestId"
        data:
          type: array
          items:
            $ref: "#/components/schemas/IndexVersion"

    DocumentUploadRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string
            format: binary
        owner_department_id:
          type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
        folder_id:
          type: [string, "null"]
        idempotency_key:
          type: string
    DocumentImportRequest:
      type: object
      required: [job_type, items]
      properties:
        job_type:
          type: string
          enum: [url, metadata_batch]
        owner_department_id:
          type: string
        visibility:
          $ref: "#/components/schemas/Visibility"
        idempotency_key:
          type: string
        items:
          type: array
          items:
            type: object
            required: [title]
            properties:
              title:
                type: string
              url:
                type: string
                format: uri
              metadata:
                type: object
                additionalProperties: true
    ImportJob:
      type: object
      required: [id, kb_id, status, stage]
      properties:
        id:
          type: string
        kb_id:
          type: string
        status:
